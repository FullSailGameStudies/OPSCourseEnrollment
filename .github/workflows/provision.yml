name: Provision Student Repository

on:
  issues:
    types: [opened]


jobs:
  create-repo:
    # if: contains(github.event.issue.labels.*.name, 'provision-repo')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Enrollment Repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.ORG_ADMIN_TOKEN }}

      - name: Parse and Validate Student Email Hash
        id: code_check
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          # Hardcoded configuration
          ORG_NAME="FullSailGameStudies"

          # Expected passcode hash (SHA-256)
          EXPECTED_HASH="1d39a1077910f88cb84fc2b73c5efa09577868b68acdd496731cc65a33a99e17"

          # Redact claim code in the issue body (if applicable)
          REDACTED_BODY=$(echo "$ISSUE_BODY" | sed "s/$STUDENT_CODE/[used claim code]/g")
          gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$REDACTED_BODY"

          # Validate the passcode hash
          if [ "$STUDENT_HASH" != "$EXPECTED_HASH" ]; then
            echo "AUTH_FAILED=true" >> $GITHUB_ENV
            echo "::error::Invalid passcode."
            exit 1
          fi
          echo "AUTH_FAILED=false" >> $GITHUB_ENV
          echo "DYNAMIC_ORG_NAME=$ORG_NAME" >> $GITHUB_ENV

      - name: Handle Invalid Passcode
        if: env.AUTH_FAILED == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE_NUMBER --repo "$GITHUB_REPOSITORY" --body "❌ **Repository Creation Failed:**."
          gh issue close $ISSUE_NUMBER --repo "$GITHUB_REPOSITORY" --reason "not_planned"
          exit 2

      - name: Provision All Lab Repositories
        if: env.AUTH_FAILED == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          ORG: ${{ env.DYNAMIC_ORG_NAME }}
          STUDENT: ${{ github.event.issue.user.login }}
        run: |
          MONTH_ABBREV=$(date +"%b" | tr '[:lower:]' '[:upper:]')
          LABS="3 4 5 6 7"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          SUMMARY=""

          for N in $LABS; do
            TEMPLATE_REPO="OPS_Lab${N}"
            NEW_REPO_NAME="OPS_${MONTH_ABBREV}_Lab${N}_${STUDENT}"

            # Skip creation if the student already has this repo
            if gh repo view "$ORG/$NEW_REPO_NAME" > /dev/null 2>&1; then
              echo "::warning::Repository $ORG/$NEW_REPO_NAME already exists. Skipping."
              SUMMARY="${SUMMARY}- https://github.com/${ORG}/${NEW_REPO_NAME} (already existed)\n"
              continue
            fi

            echo "Creating private repository $NEW_REPO_NAME from template $TEMPLATE_REPO..."
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              /repos/$ORG/$TEMPLATE_REPO/generate \
              -f owner="$ORG" \
              -f name="$NEW_REPO_NAME" \
              -F private=true

            # Wait for the template copy to finish initializing branches (45s max)
            for i in $(seq 1 15); do
              BRANCH_CHECK=$(gh api /repos/$ORG/$NEW_REPO_NAME/branches --jq '.[].name' 2>/dev/null || true)
              if [ -n "$BRANCH_CHECK" ]; then
                echo "Repository files and branches initialized successfully!"
                break
              fi
              echo "Template copy in progress... waiting 3 seconds (Attempt $i/15)"
              sleep 3
            done
            sleep 5

            echo "Adding student $STUDENT as a collaborator..."
            gh api \
              --method PUT \
              -H "Accept: application/vnd.github+json" \
              /repos/$ORG/$NEW_REPO_NAME/collaborators/$STUDENT \
              -f permission='write'

            echo "Setting topics..."
            gh repo edit "$ORG/$NEW_REPO_NAME" --add-topic "ops_student"
            gh repo edit "$ORG/$NEW_REPO_NAME" --add-topic "not_graded"

            echo "Initializing assignment branch and PR..."
            rm -rf "$NEW_REPO_NAME"
            git clone "https://x-access-token:${GH_TOKEN}@github.com/${ORG}/${NEW_REPO_NAME}.git"
            (
              cd "$NEW_REPO_NAME"
              git checkout main
              git checkout -b assignment
              git push origin assignment
              git commit --allow-empty -m "Initialize assignment branch"
              git push origin main
            )
            gh pr create \
              --repo "$ORG/$NEW_REPO_NAME" \
              --title "Grading and Feedback" \
              --body "This Pull Request tracks your progress. Instructors will leave reviews here. Do not close or merge." \
              --base "assignment" \
              --head "main"

            SUMMARY="${SUMMARY}- https://github.com/${ORG}/${NEW_REPO_NAME}\n"
          done

          {
            echo "PROVISION_SUMMARY<<EOF"
            printf "%b" "$SUMMARY"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Close Issue and Reply to Student
        if: env.AUTH_FAILED == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          STUDENT: ${{ github.event.issue.user.login }}
        run: |
          gh issue comment $ISSUE_NUMBER \
            --repo "$GITHUB_REPOSITORY" \
            --body "@${STUDENT}, your private lab repositories have been configured:

          ${PROVISION_SUMMARY}"
          gh issue close $ISSUE_NUMBER \
            --repo "$GITHUB_REPOSITORY" \
            --reason "completed"
